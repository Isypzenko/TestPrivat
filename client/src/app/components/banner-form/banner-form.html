<div class="form-container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>
        {{ isEditMode ? 'Редактирование банера' : 'Создание нового банера' }}
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="bannerForm" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Заголовок банера</mat-label>
          <input matInput formControlName="title" placeholder="Например: Скидки 50%" />
          @if (bannerForm.get('title')?.hasError('required')) {
            <mat-error>Заголовок обязателен</mat-error>
          }
        </mat-form-field>

        <input
          type="file"
          #fileInput
          style="display: none"
          accept="image/*"
          (change)="onFileSelected($event)"
        />

        <div class="file-upload-actions">
          <button type="button" mat-stroked-button color="primary" (click)="fileInput.click()">
            <mat-icon>image</mat-icon>
            {{ imagePreview() ? 'Изменить картинку' : 'Выбрать картинку' }}
          </button>
        </div>

        @if (imagePreview()) {
          <div class="preview-container">
            <p class="preview-label">Предпросмотр:</p>
            <div class="image-wrapper">
              <img [src]="imagePreview()" alt="Preview" />
              <button
                type="button"
                mat-mini-fab
                color="warn"
                class="remove-btn"
                (click)="removeImage()"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </div>
        }

        <mat-card-actions class="form-actions">
          <button mat-button type="button" routerLink="/">Отмена</button>

          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="bannerForm.invalid || !imagePreview()"
          >
            {{ isEditMode ? 'ОБНОВИТЬ БАНЕР' : 'СОХРАНИТЬ БАНЕР' }}
          </button>
        </mat-card-actions>
      </form>
    </mat-card-content>
  </mat-card>
</div>
