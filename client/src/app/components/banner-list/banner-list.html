<div class="banner-grid">
  @if (isLoading()) {
    <div class="loading-spinner">
      <p>Загружаем баннеры...</p>
    </div>
  } @else {
    @for (banner of banners; track banner.id) {
      <mat-card [animate.enter]="'banner-enter'" [animate.leave]="'banner-gone'">
        <mat-card class="banner-card">
          <img mat-card-image [src]="banner.src" alt="Banner Image" />

          <mat-card-content>
            <h3>{{ banner.title }}</h3>
          </mat-card-content>

          <mat-card-actions>
            <button mat-button color="primary" [routerLink]="['/edit', banner.id]">
              РЕДАКТИРОВАТЬ
            </button>
            <button mat-button color="warn" (click)="onDelete(banner.id)">УДАЛИТЬ</button>
          </mat-card-actions>
        </mat-card>
      </mat-card>
    } @empty {
      <div class="empty-state">
        <p>Банеров пока нет. Создайте первый!</p>
        <button mat-raised-button color="primary" routerLink="/create">Создать баннер</button>
      </div>
    }
  }
</div>
